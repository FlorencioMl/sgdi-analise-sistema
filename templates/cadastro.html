{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Cadastro</h2>

    <form method="POST">
        <input type="text" name="nome" placeholder="Novo usuário" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Cadastrar</button>
    </form>

    <p>
        Já possui conta?
        <a href="/login">Fazer login</a>
    </p>
</div>
{% endblock %}
