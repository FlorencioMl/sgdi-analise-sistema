{% extends "base.html" %}

{% block content %}
<h2>Lista de Demandas</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Solicitante</th>
            <th>Data</th>
            <th>Prioridade</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for demanda in demandas %}
        <tr>
            <td>{{ demanda[0] }}</td>
            <td>{{ demanda[1] }}</td>
            <td>{{ demanda[3] }}</td>
            <td>{{ demanda[4] }}</td>

        
            <td>
                <span class="
                    {% if demanda[5] == 'Critica' %}critica
                    {% elif demanda[5] == 'Alta' %}alta
                    {% else %}baixa
                    {% endif %}
                ">
                    {{ demanda[5] }}
                </span>
            </td>

            <td>
                <a href="/detalhes/{{ demanda[0] }}">Ver</a> |
                <a href="/editar/{{ demanda[0] }}">Editar</a> |
                <a href="/deletar/{{ demanda[0] }}" style="color:red;">Deletar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<br><br>
<a href="/nova_demanda"><button>+ Nova Demanda</button></a>

{% endblock %}
