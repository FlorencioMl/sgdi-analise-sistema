{% extends "base.html" %}

{% block content %}
<h2>Lista de Demandas</h2>
    <form method="GET" action="/" style="margin-bottom:20px;">
        <label><strong>Filtrar por prioridade:</strong></label>

        <select name="prioridade">
            <option value="Todas">Todas</option>
            <option value="Alta">Alta</option>
            <option value="Media">Média</option>
            <option value="Baixa">Baixa</option>
        </select>

    <button type="submit">Filtrar</button>
</form>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Solicitante</th>
            <th>Data</th>
            <th>Prioridade</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
    {% for demanda in demandas %}
    <tr>
        <td>{{ demanda[0] }}</td>
        <td>{{ demanda[1] }}</td>
        <td>{{ demanda[3] }}</td>
        <td>{{ demanda[4] }}</td>

        <td>
            <span class="
                {% if demanda[5] == 'Alta' %}alta
                {% elif demanda[5] == 'Media' %}media
                {% else %}baixa
                {% endif %}
            ">
                {{ demanda[5] }}
            </span>
        </td>

        <td>
            <a href="/detalhes/{{ demanda[0] }}">Ver</a> |
            <a href="/editar/{{ demanda[0] }}">Editar</a> |
            <a href="/deletar/{{ demanda[0] }}" style="color:red;">Deletar</a>
        </td>
    </tr>
    {% endfor %}
</tbody>
</table>

<br><br>
<a href="/nova_demanda"><button>+ Nova Demanda</button></a>

{% endblock %}
