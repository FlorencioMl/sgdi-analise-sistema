{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Login</h2>

    <form method="POST">
        <input type="text" name="nome" placeholder="Usuário" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

    <p>
        Não tem conta?
        <a href="/cadastro">Cadastre-se</a>
    </p>
</div>
{% endblock %}
